{{- range $name, $route := .Values.httproute.routes }}
{{- if $route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "timed.fullname" $ }}{{ if ne $name "main" }}-{{ $name }}{{ end }}
  labels:
    {{- include "timed.labels" $ | nindent 4 }}
    {{- with $route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $route.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $route.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    {{- if $route.httpsRedirect }}
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ $route.statusCode | default 308 }}
      matches:
        - path:
            type: PathPrefix
            value: /
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /admin/
      backendRefs:
        - name: {{ $.Values.backend.service.name }}
          port: {{ $.Values.backend.service.externalPort }}

    - matches:
        - path:
            type: PathPrefix
            value: /static/
      backendRefs:
        - name: {{ $.Values.backend.service.name }}
          port: {{ $.Values.backend.service.externalPort }}

    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: {{ $.Values.backend.service.name }}
          port: {{ $.Values.backend.service.externalPort }}

    - matches:
        - path:
            type: PathPrefix
            value: /oidc/
      backendRefs:
        - name: {{ $.Values.backend.service.name }}
          port: {{ $.Values.backend.service.externalPort }}

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $.Values.frontend.service.name }}
          port: {{ $.Values.frontend.service.externalPort }}
    {{- end }}
{{- end }}
{{- end }}
