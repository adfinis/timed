---
name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "ember/**"
  pull_request:
    paths:
      - "ember/**"

env:
  NODE_VERSION: 20

defaults:
  run:
    working-directory: ./ember

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the prod image
        run: |
          docker build --target frontend .

  lint:
    runs-on: [ubuntu-latest]
    timeout-minutes: 5

    strategy:
      matrix:
        target: [js, hbs, css, format]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # install pnpm as specified in `packageManager`
          package_json_file: "ember/package.json"

      - run: |
          mkdir -p ~/.local/share/pnpm/store/v10
          pnpm config set store-dir ~/.local/share/pnpm/store/v10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ember/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint ${{ matrix.target }}
        run: pnpm --filter timed lint:${{ matrix.target }}

  test:
    needs: [lint]
    runs-on: [ubuntu-latest]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # install pnpm as specified in `packageManager`
          package_json_file: "ember/package.json"

      - run: |
          mkdir -p ~/.local/share/pnpm/store/v10
          pnpm config set store-dir ~/.local/share/pnpm/store/v10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ember/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm --filter timed test
