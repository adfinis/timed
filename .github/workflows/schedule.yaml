---
name: Schedule

on:
  schedule:
    - cron: 15 11 * * *
  workflow_dispatch:

jobs:
  scan:
    strategy:
      matrix:
        image: [backend, customer-center, frontend]

    name: Scan ${{ matrix.image }} image
    runs-on: ubuntu-latest
    permissions:
      actions: none
      checks: none
      contents: none
      deployments: none
      issues: none
      packages: write
      pull-requests: none
      repository-projects: none
      security-events: write
      statuses: none
      # needed for `cosign attest`
      id-token: write
    steps:
      - uses: adfinis/container-scanning-action@53e18d502e30b80296ef1582a820b4bc521c9df8 # v0.4.2
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          attest: true
          token: ${{ secrets.GITHUB_TOKEN }}
