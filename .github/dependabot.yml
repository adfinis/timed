---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "12:00"
      timezone: "Europe/Zurich"
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: daily
      time: "12:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: chore
      include: scope
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7

    groups:
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"

  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: daily
      time: "12:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: "/ember"
    schedule:
      interval: daily
      time: "12:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /ember
    schedule:
      interval: daily
      time: "12:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 20
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
